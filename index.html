<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>choromusi.ca</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      padding: 2rem 1rem 0.5rem;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      color: #f5c842;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
      letter-spacing: 2px;
    }
    h1 span { color: #2ecc71; }
    .subtitle {
      font-size: 1.1rem;
      color: #bbb;
      margin-top: 0.3rem;
    }
    .instruction {
      font-size: 0.95rem;
      color: #f5c842;
      margin-top: 0.8rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .map-container {
      position: relative;
      width: 90vw;
      max-width: 800px;
      margin: 1rem auto 2rem;
    }
    svg { width: 100%; height: auto; }
    svg path {
      stroke: #1a1a2e;
      stroke-width: 1.5;
      transition: filter 0.2s, transform 0.2s;
      cursor: default;
    }
    svg path:hover {
      filter: brightness(1.2);
    }
    svg path.clickable {
      cursor: pointer;
    }
    svg path.clickable:hover {
      filter: brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,0.4));
    }
    .state-label {
      font-family: Arial, sans-serif;
      font-size: 9px;
      fill: #fff;
      text-anchor: middle;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    }
    .state-label-dark {
      fill: #222;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      position: relative;
      background: #222;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 90vw;
      box-shadow: 0 0 40px rgba(245,200,66,0.3);
    }
    .modal-content h2 {
      color: #f5c842;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      text-align: center;
    }
    .modal-content iframe {
      display: block;
      border-radius: 8px;
      max-width: 100%;
    }
    .modal-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f5c842;
      color: #1a1a2e;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .modal-close:hover { background: #fff; }

    .rio-marker {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .rio-marker:hover {
      transform: scale(1.15);
    }
  </style>
</head>
<body>
  <header>
    <h1>choro<span>musi</span>.ca</h1>
    <p class="subtitle">Exploring the music of Brazil</p>
    <p class="instruction">Click on Rio de Janeiro to listen</p>
  </header>

  <div class="map-container">
    <svg viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg">
      <!-- Amazonas -->
      <path d="M80,120 L190,80 L280,85 L310,110 L320,160 L310,220 L280,260 L240,280 L180,280 L120,260 L70,220 L60,170 Z" fill="#2ecc71" />
      <text x="185" y="180" class="state-label">AM</text>

      <!-- Roraima -->
      <path d="M190,80 L230,30 L280,20 L310,40 L310,80 L280,85 Z" fill="#e74c3c" />
      <text x="255" y="58" class="state-label">RR</text>

      <!-- Amapa -->
      <path d="M310,40 L350,15 L390,25 L400,65 L380,90 L350,95 L320,90 L310,80 Z" fill="#9b59b6" />
      <text x="355" y="58" class="state-label">AP</text>

      <!-- Para -->
      <path d="M310,80 L320,90 L350,95 L380,90 L400,65 L440,80 L480,100 L500,140 L490,190 L460,230 L420,250 L380,260 L340,250 L310,220 L320,160 L310,110 Z" fill="#3498db" />
      <text x="400" y="165" class="state-label">PA</text>

      <!-- Maranhao -->
      <path d="M460,230 L490,190 L500,140 L540,150 L560,180 L560,230 L540,260 L510,270 L480,260 Z" fill="#e67e22" />
      <text x="520" y="210" class="state-label">MA</text>

      <!-- Tocantins -->
      <path d="M420,250 L460,230 L480,260 L490,300 L480,350 L460,390 L430,400 L400,380 L390,340 L400,290 Z" fill="#1abc9c" />
      <text x="440" y="320" class="state-label">TO</text>

      <!-- Mato Grosso -->
      <path d="M240,280 L280,260 L310,220 L340,250 L380,260 L420,250 L400,290 L390,340 L400,380 L380,420 L340,440 L290,430 L250,400 L240,350 L230,310 Z" fill="#f39c12" />
      <text x="320" y="350" class="state-label">MT</text>

      <!-- Rondonia -->
      <path d="M180,280 L240,280 L230,310 L240,350 L220,370 L180,360 L150,330 L140,290 Z" fill="#e74c3c" />
      <text x="190" y="325" class="state-label">RO</text>

      <!-- Acre -->
      <path d="M60,240 L120,260 L180,280 L140,290 L100,300 L50,290 L30,265 Z" fill="#8e44ad" />
      <text x="100" y="275" class="state-label">AC</text>

      <!-- Goias -->
      <path d="M400,380 L430,400 L450,430 L460,470 L440,500 L410,510 L380,500 L360,470 L340,440 L380,420 Z" fill="#2980b9" />
      <text x="405" y="455" class="state-label">GO</text>

      <!-- Distrito Federal -->
      <path d="M430,450 L445,445 L450,460 L435,465 Z" fill="#ecf0f1" />
      <text x="440" y="457" class="state-label state-label-dark" style="font-size:6px">DF</text>

      <!-- Mato Grosso do Sul -->
      <path d="M250,400 L290,430 L340,440 L360,470 L350,520 L320,550 L280,560 L240,540 L220,500 L220,450 Z" fill="#16a085" />
      <text x="290" y="495" class="state-label">MS</text>

      <!-- Minas Gerais -->
      <path d="M410,510 L440,500 L460,470 L490,460 L530,470 L560,490 L570,530 L550,570 L510,580 L470,570 L440,550 L410,540 L390,520 Z" fill="#d35400" />
      <text x="485" y="525" class="state-label">MG</text>

      <!-- Sao Paulo -->
      <path d="M350,520 L390,520 L410,540 L440,550 L430,580 L400,600 L360,600 L330,580 L320,550 Z" fill="#7f8c8d" />
      <text x="380" y="570" class="state-label">SP</text>

      <!-- Parana -->
      <path d="M320,550 L360,600 L370,630 L340,650 L300,650 L270,630 L260,600 L280,560 Z" fill="#c0392b" />
      <text x="315" y="615" class="state-label">PR</text>

      <!-- Santa Catarina -->
      <path d="M300,650 L340,650 L360,670 L350,695 L310,700 L280,690 L275,665 Z" fill="#27ae60" />
      <text x="318" y="680" class="state-label">SC</text>

      <!-- Rio Grande do Sul -->
      <path d="M275,690 L310,700 L350,695 L355,720 L330,745 L290,750 L255,735 L245,710 Z" fill="#f1c40f" />
      <text x="305" y="725" class="state-label state-label-dark">RS</text>

      <!-- Bahia -->
      <path d="M490,300 L530,290 L570,310 L600,350 L620,400 L610,440 L590,470 L560,490 L530,470 L490,460 L460,470 L450,430 L430,400 L460,390 L480,350 Z" fill="#e74c3c" />
      <text x="545" y="395" class="state-label">BA</text>

      <!-- Piaui -->
      <path d="M510,270 L540,260 L560,230 L580,240 L590,270 L580,300 L560,310 L530,290 L490,300 L480,260 Z" fill="#2ecc71" />
      <text x="540" y="275" class="state-label">PI</text>

      <!-- Ceara -->
      <path d="M580,240 L600,220 L630,210 L650,225 L640,255 L620,270 L590,270 Z" fill="#f1c40f" />
      <text x="618" y="245" class="state-label state-label-dark">CE</text>

      <!-- Rio Grande do Norte -->
      <path d="M650,225 L680,215 L700,225 L690,245 L665,255 L640,255 Z" fill="#3498db" />
      <text x="670" y="240" class="state-label">RN</text>

      <!-- Paraiba -->
      <path d="M640,255 L665,255 L690,245 L700,260 L680,275 L650,275 L630,270 Z" fill="#e67e22" />
      <text x="668" y="267" class="state-label">PB</text>

      <!-- Pernambuco -->
      <path d="M590,270 L620,270 L630,270 L650,275 L680,275 L700,285 L690,305 L640,310 L600,310 L580,300 Z" fill="#9b59b6" />
      <text x="645" y="295" class="state-label">PE</text>

      <!-- Alagoas -->
      <path d="M640,310 L690,305 L700,320 L680,330 L650,325 Z" fill="#1abc9c" />
      <text x="670" y="320" class="state-label">AL</text>

      <!-- Sergipe -->
      <path d="M640,325 L650,325 L680,330 L670,350 L645,345 Z" fill="#f39c12" />
      <text x="660" y="340" class="state-label">SE</text>

      <!-- Espirito Santo -->
      <path d="M570,530 L600,520 L615,540 L605,565 L580,570 L560,560 Z" fill="#2ecc71" />
      <text x="588" y="548" class="state-label">ES</text>

      <!-- Rio de Janeiro -->
      <path class="clickable" id="rio" d="M440,550 L470,570 L510,580 L530,590 L540,610 L520,620 L490,615 L460,600 L430,580 Z"
            fill="#f5c842" onclick="openVideo()" />
      <text x="485" y="595" class="state-label state-label-dark" style="font-size:8px; font-weight:bold">RJ</text>

      <!-- Pulsing circle on Rio -->
      <g class="rio-marker" onclick="openVideo()">
        <circle cx="490" cy="595" r="12" fill="rgba(245,200,66,0.3)">
          <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="490" cy="595" r="6" fill="#f5c842" stroke="#1a1a2e" stroke-width="2" />
      </g>
    </svg>
  </div>

  <!-- Video Modal -->
  <div class="modal-overlay" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeVideo()">&times;</button>
      <h2>Rio de Janeiro</h2>
      <iframe id="videoFrame" width="560" height="315" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const videoUrl = "https://www.youtube.com/embed/_Q3PRWcaN3E?si=Vsp-cbkSJ6OLkUa-";

    function openVideo() {
      document.getElementById('videoFrame').src = videoUrl;
      document.getElementById('videoModal').classList.add('active');
    }

    function closeVideo() {
      document.getElementById('videoModal').classList.remove('active');
      document.getElementById('videoFrame').src = '';
    }

    // Close modal on overlay click
    document.getElementById('videoModal').addEventListener('click', function(e) {
      if (e.target === this) closeVideo();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeVideo();
    });
  </script>
</body>
</html>
